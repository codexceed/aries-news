<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Aries News{% endblock %}</title>
    {# Set the theme before first paint so there is no light/dark flash. #}
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.dataset.theme = saved || (prefersDark ? "dark" : "light");
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/app.css" />
    <script defer src="/static/js/htmx.min.js"></script>
    <script defer src="/static/js/htmx-ext-sse.js"></script>
    <script defer src="/static/js/alpine.min.js"></script>
  </head>
  <body hx-ext="sse">
    <header class="site-header">
      <a class="brand" href="/">
        <span class="brand__mark" aria-hidden="true"></span>
        News Search
      </a>
      <nav class="nav">
        <a href="/search" {% if active=='search' %}aria-current="page"{% endif %}>Search</a>
        <a href="/insights" {% if active=='insights' %}aria-current="page"{% endif %}>AI Insights</a>
        <button
          type="button"
          class="theme-toggle"
          aria-label="Toggle light and dark theme"
          onclick="(function(){var r=document.documentElement;var t=r.dataset.theme==='dark'?'light':'dark';r.dataset.theme=t;try{localStorage.setItem('theme',t);}catch(e){}})()"
        >
          <span class="theme-toggle__icon" aria-hidden="true"></span>
        </button>
      </nav>
    </header>

    {% block content %}{% endblock %}

    <footer class="site-footer">
      <div class="container">
        <span>Aries News · reading room</span>
        <span>Search the day, read the mood</span>
      </div>
    </footer>
  </body>
</html>
