name: Release

# Automated releases + CHANGELOG via release-please. On each push to main it
# maintains a "release PR" that bumps the version and updates CHANGELOG.md from
# Conventional Commits; merging that PR tags the version and cuts a GitHub
# release.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: python
