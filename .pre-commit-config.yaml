# Pre-commit: linting + a fast, no-DB test subset. Uses the project's pinned
# tools via `uv run` so versions match CI exactly.
# Install once: `uv run pre-commit install`
default_language_version:
  python: python3.12

repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]

      - id: ruff
        name: ruff lint
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]

      - id: pyright
        name: pyright (strict)
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false

      - id: fast-tests
        name: fast tests (no DB, no e2e)
        entry: uv run pytest -m "not e2e and not db" -q
        language: system
        types: [python]
        pass_filenames: false
