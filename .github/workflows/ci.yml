name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aries
          POSTGRES_PASSWORD: aries
          POSTGRES_DB: aries
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aries -d aries"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://aries:aries@localhost:5432/aries

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # The Makefile is the single source of truth for how to build/test/check
      # the project; CI invokes the same targets rather than re-spelling them.
      - name: Install dependencies (deps + Playwright browser)
        run: make install

      - name: Lint (ruff check + format)
        run: make lint

      - name: Typecheck (pyright, strict)
        run: make typecheck

      - name: Pylint
        run: make pylint

      - name: Tests (unit + integration, with coverage)
        run: make test

      # Playwright's browser binary comes from `make install`; CI additionally
      # needs its OS libraries — an environment-provisioning step, not a project
      # command, so it stays out of the Makefile (it would break non-Linux devs).
      - name: Install Playwright system dependencies
        run: uv run playwright install-deps chromium

      - name: E2E smoke test
        run: make test-e2e
